spring:
  application:
    name: auth-service

  datasource:
    url: ${DB_URL:jdbc:h2:file:./data/authdb;DB_CLOSE_DELAY=-1}
    driver-class-name: org.h2.Driver
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:true}
      path: /h2-console

server:
  port: ${SERVER_PORT:8081}

app:
  jwt:
    # Base64-encoded HMAC secret. Override in real environments via APP_JWT_SECRET.
    secret: ${APP_JWT_SECRET:c2ltcGxlLWlkLWRldi1zZWNyZXQtY2hhbmdlLW1lLXBsZWFzZS0zMi1ieXRlcy1taW4=}
    issuer: simple-id
    access-token-ttl: ${APP_JWT_ACCESS_TTL:PT15M}
    refresh-token-ttl: ${APP_JWT_REFRESH_TTL:P7D}

logging:
  level:
    org.flywaydb: info
